<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: {
    colors: {
      background:'#FBFAF5', foreground:'#14261F',
      card:{DEFAULT:'#FFFFFF',foreground:'#14261F'},
      primary:{DEFAULT:'#1E4D3B',foreground:'#F5F3EC'},
      secondary:{DEFAULT:'#E5EDE7',foreground:'#1E4D3B'},
      muted:{DEFAULT:'#F1EFE7',foreground:'#6F7A72'},
      destructive:{DEFAULT:'#C0503B',foreground:'#FFFFFF'},
      border:'#E7E4DA'
    },
    borderRadius:{ xl:'1.25rem', md:'calc(1rem - 2px)' },
    fontFamily:{ sans:['Hanken Grotesk','sans-serif'], display:['Schibsted Grotesk','sans-serif'] }
  }}}
</script>
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;700;900&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>body{font-family:'Hanken Grotesk',sans-serif}</style>
</head>
<body class="bg-background p-6">
  <div class="max-w-sm rounded-xl border border-border bg-card text-card-foreground shadow-sm py-6 flex flex-col gap-4">
    <div class="px-6 flex items-start justify-between">
      <div>
        <div class="font-display text-lg font-bold leading-tight">Llamada bloqueada</div>
        <div class="text-sm text-muted-foreground mt-1">Hace 2 minutos · Número desconocido</div>
      </div>
      <span class="inline-flex items-center rounded-full bg-destructive px-2.5 py-0.5 text-xs font-semibold text-destructive-foreground">Estafa</span>
    </div>
    <div class="px-6 text-sm text-muted-foreground">
      GhostLine identificó este número en la red de reportes de estafa telefónica y lo detuvo por ti.
    </div>
    <div class="px-6 flex gap-3">
      <button class="inline-flex h-9 items-center rounded-md bg-primary px-4 text-sm font-semibold text-primary-foreground">Ver detalles</button>
      <button class="inline-flex h-9 items-center rounded-md px-4 text-sm font-semibold text-foreground hover:bg-secondary">Marcar como seguro</button>
    </div>
  </div>
</body></html>
