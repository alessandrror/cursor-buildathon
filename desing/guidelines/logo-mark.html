<!DOCTYPE html>
<html lang="es">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--surface-app);padding:22px;}
  .row{display:flex;gap:16px;}
  .t{flex:1;aspect-ratio:1.5;border-radius:var(--radius-xl);display:flex;align-items:center;justify-content:center;}
  img{width:64px;height:64px;}
  .cap{text-align:center;font-size:11px;color:var(--text-muted);margin-top:9px;}
  .u{flex:1;}
</style></head>
<body>
  <div class="row">
    <div class="u"><div class="t" style="background:var(--gl-sage-100)"><img src="../assets/ghostline-mark.svg" alt="mark"></div><div class="cap">Positivo · Pino</div></div>
    <div class="u"><div class="t" style="background:var(--gl-pine)"><img src="../assets/ghostline-mark-bone.svg" alt="mark reverse"></div><div class="cap">Negativo · Hueso</div></div>
    <div class="u"><div class="t" style="background:var(--gl-white);border:1px solid var(--border-subtle)"><img src="../assets/ghostline-mark-outline.svg" alt="mark outline"></div><div class="cap">Contorno · monocromo</div></div>
  </div>
</body></html>
