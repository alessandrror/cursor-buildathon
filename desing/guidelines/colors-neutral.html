<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals & surfaces" subtitle="Hueso, Paper, Blanco, Tinta, bordes" -->
<!DOCTYPE html>
<html lang="es">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--surface-app);padding:20px;}
  .row{display:flex;gap:14px;}
  .sw{flex:1;}
  .chip{height:78px;border-radius:var(--radius-lg);box-shadow:var(--shadow-xs);}
  .nm{font-weight:var(--fw-semibold);font-size:13px;color:var(--text-strong);margin-top:9px;}
  .hex{font-size:12px;color:var(--text-muted);}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--gl-paper);border:1px solid var(--border-subtle)"></div><div class="nm">Paper · App bg</div><div class="hex">#FBFAF5</div></div>
    <div class="sw"><div class="chip" style="background:var(--gl-bone);border:1px solid var(--border-subtle)"></div><div class="nm">Hueso · Inset</div><div class="hex">#F5F3EC</div></div>
    <div class="sw"><div class="chip" style="background:var(--gl-sage-100)"></div><div class="nm">Salvia 100 · Tint</div><div class="hex">#E5EDE7</div></div>
    <div class="sw"><div class="chip" style="background:var(--gl-white);border:1px solid var(--border-subtle)"></div><div class="nm">Blanco · Card</div><div class="hex">#FFFFFF</div></div>
    <div class="sw"><div class="chip" style="background:var(--gl-ink)"></div><div class="nm">Tinta · Text</div><div class="hex">#14261F</div></div>
  </div>
</body></html>
