<!DOCTYPE html>
<html lang="es">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--surface-app);padding:24px;}
  .row{display:flex;gap:16px;}
  .box{flex:1;border-radius:var(--radius-xl);padding:26px 24px;display:flex;align-items:center;gap:14px;}
  img{width:46px;height:46px;}
  .wm{font-family:var(--font-display);font-weight:var(--fw-black);font-size:30px;letter-spacing:var(--ls-tight);}
</style></head>
<body>
  <div class="row">
    <div class="box" style="background:var(--gl-white);border:1px solid var(--border-subtle)">
      <img src="../assets/ghostline-mark.svg" alt="">
      <span class="wm" style="color:var(--gl-forest)">Ghost<span style="font-weight:var(--fw-regular);color:var(--gl-sage)">Line</span></span>
    </div>
    <div class="box" style="background:var(--gl-pine)">
      <img src="../assets/ghostline-mark-bone.svg" alt="">
      <span class="wm" style="color:var(--gl-bone)">Ghost<span style="font-weight:var(--fw-regular);color:var(--gl-sage-300)">Line</span></span>
    </div>
  </div>
</body></html>
