<!DOCTYPE html>
<html lang="es">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--surface-app);padding:22px 24px;color:var(--text-strong);}
  .r{display:flex;align-items:baseline;gap:16px;padding:5px 0;border-bottom:1px solid var(--border-subtle);}
  .r:last-child{border-bottom:0;}
  .lbl{font-size:11px;color:var(--text-muted);width:96px;flex-shrink:0;font-variant-numeric:tabular-nums;}
  .s{font-family:var(--font-display);font-weight:var(--fw-bold);letter-spacing:var(--ls-tight);white-space:nowrap;}
</style></head>
<body>
  <div class="r"><span class="lbl">5xl · 64</span><span class="s" style="font-size:44px">Aa Título</span></div>
  <div class="r"><span class="lbl">3xl · 36</span><span class="s" style="font-size:32px">Aa Título</span></div>
  <div class="r"><span class="lbl">2xl · 28</span><span class="s" style="font-size:26px">Aa Sección</span></div>
  <div class="r"><span class="lbl">xl · 22</span><span class="s" style="font-size:22px">Aa Subtítulo</span></div>
  <div class="r"><span class="lbl">base · 16</span><span class="s" style="font-size:16px;font-weight:var(--fw-regular);font-family:var(--font-body)">Aa Cuerpo de texto</span></div>
  <div class="r"><span class="lbl">sm · 14</span><span class="s" style="font-size:14px;font-weight:var(--fw-regular);font-family:var(--font-body)">Aa Etiqueta secundaria</span></div>
</body></html>
