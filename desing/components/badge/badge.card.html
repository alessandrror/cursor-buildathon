<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: {
    colors: {
      background:'#FBFAF5', foreground:'#14261F',
      primary:{DEFAULT:'#1E4D3B',foreground:'#F5F3EC'},
      secondary:{DEFAULT:'#E5EDE7',foreground:'#1E4D3B'},
      muted:{DEFAULT:'#F1EFE7',foreground:'#6F7A72'},
      accent:{DEFAULT:'#E8C98E',foreground:'#14261F'},
      destructive:{DEFAULT:'#C0503B',foreground:'#FFFFFF'},
      success:{DEFAULT:'#2F7D57',foreground:'#FFFFFF'},
      warning:{DEFAULT:'#C68A2E',foreground:'#14261F'},
      border:'#E7E4DA'
    },
    fontFamily:{ sans:['Hanken Grotesk','sans-serif'] }
  }}}
</script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Hanken Grotesk',sans-serif}</style>
</head>
<body class="bg-background p-6">
  <div class="flex flex-wrap gap-2.5 items-center">
    <span class="inline-flex items-center rounded-full bg-primary px-2.5 py-0.5 text-xs font-semibold text-primary-foreground">Protegido</span>
    <span class="inline-flex items-center rounded-full bg-secondary px-2.5 py-0.5 text-xs font-semibold text-secondary-foreground">En revisión</span>
    <span class="inline-flex items-center rounded-full bg-accent px-2.5 py-0.5 text-xs font-semibold text-accent-foreground">Nuevo</span>
    <span class="inline-flex items-center rounded-full bg-success px-2.5 py-0.5 text-xs font-semibold text-success-foreground">Seguro</span>
    <span class="inline-flex items-center rounded-full bg-warning px-2.5 py-0.5 text-xs font-semibold text-warning-foreground">Sospechoso</span>
    <span class="inline-flex items-center rounded-full bg-destructive px-2.5 py-0.5 text-xs font-semibold text-destructive-foreground">Bloqueado</span>
    <span class="inline-flex items-center rounded-full border border-border px-2.5 py-0.5 text-xs font-semibold text-foreground">Outline</span>
  </div>
</body></html>
