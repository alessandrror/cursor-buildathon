<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: {
    colors: {
      background:'#FBFAF5', foreground:'#14261F',
      primary:{DEFAULT:'#1E4D3B',foreground:'#F5F3EC'},
      muted:{DEFAULT:'#F1EFE7',foreground:'#6F7A72'},
      border:'#E7E4DA', input:'#E7E4DA', ring:'#8FB09B'
    },
    borderRadius:{ md:'calc(1rem - 2px)' },
    fontFamily:{ sans:['Hanken Grotesk','sans-serif'] }
  }}}
</script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>body{font-family:'Hanken Grotesk',sans-serif}</style>
</head>
<body class="bg-background p-6">
  <div class="max-w-sm flex flex-col gap-5">
    <div class="flex flex-col gap-2">
      <label class="text-sm font-medium">Número a bloquear</label>
      <input placeholder="+503 0000 0000" class="h-10 w-full rounded-md border border-input bg-white px-3.5 text-sm shadow-sm outline-none placeholder:text-muted-foreground focus:border-ring focus:ring-2 focus:ring-ring/50" />
    </div>
    <div class="flex flex-col gap-2">
      <label class="text-sm font-medium">Correo</label>
      <input value="ana@correo.com" class="h-10 w-full rounded-md border border-input bg-white px-3.5 text-sm shadow-sm outline-none" />
    </div>
    <div class="flex items-center justify-between">
      <span class="text-sm font-medium">Bloqueo automático de estafas</span>
      <span class="inline-flex h-6 w-11 items-center rounded-full bg-primary px-0.5">
        <span class="size-5 rounded-full bg-white shadow-sm translate-x-5 block transition-transform"></span>
      </span>
    </div>
    <div class="flex items-center justify-between">
      <span class="text-sm font-medium">Silenciar desconocidos</span>
      <span class="inline-flex h-6 w-11 items-center rounded-full bg-input px-0.5">
        <span class="size-5 rounded-full bg-white shadow-sm block"></span>
      </span>
    </div>
  </div>
</body></html>
