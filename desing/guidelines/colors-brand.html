<!-- @dsCard group="Colors" viewport="700x150" name="Brand palette" subtitle="Pino, Salvia, Arena, Bosque" -->
<!DOCTYPE html>
<html lang="es">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--surface-app);padding:20px;}
  .row{display:flex;gap:14px;}
  .sw{flex:1;}
  .chip{height:78px;border-radius:var(--radius-lg);box-shadow:var(--shadow-xs);}
  .nm{font-weight:var(--fw-semibold);font-size:13px;color:var(--text-strong);margin-top:9px;}
  .hex{font-size:12px;color:var(--text-muted);}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--gl-pine)"></div><div class="nm">Pino · Primary</div><div class="hex">#1E4D3B</div></div>
    <div class="sw"><div class="chip" style="background:var(--gl-sage)"></div><div class="nm">Salvia · Secondary</div><div class="hex">#8FB09B</div></div>
    <div class="sw"><div class="chip" style="background:var(--gl-sand)"></div><div class="nm">Arena · Accent</div><div class="hex">#E8C98E</div></div>
    <div class="sw"><div class="chip" style="background:var(--gl-forest)"></div><div class="nm">Bosque · Deep</div><div class="hex">#14261F</div></div>
  </div>
</body></html>
