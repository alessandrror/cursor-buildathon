<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="Grid base 4px" -->
<!DOCTYPE html>
<html lang="es">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--surface-app);padding:24px;}
  .row{display:flex;align-items:flex-end;gap:16px;}
  .u{text-align:center;}
  .bar{background:var(--gl-sage);border-radius:4px;width:26px;}
  .n{font-size:11px;color:var(--text-muted);margin-top:8px;font-variant-numeric:tabular-nums;}
</style></head>
<body>
  <div class="row">
    <div class="u"><div class="bar" style="height:8px"></div><div class="n">2 · 8</div></div>
    <div class="u"><div class="bar" style="height:12px"></div><div class="n">3 · 12</div></div>
    <div class="u"><div class="bar" style="height:16px"></div><div class="n">4 · 16</div></div>
    <div class="u"><div class="bar" style="height:24px"></div><div class="n">6 · 24</div></div>
    <div class="u"><div class="bar" style="height:32px"></div><div class="n">8 · 32</div></div>
    <div class="u"><div class="bar" style="height:48px"></div><div class="n">12 · 48</div></div>
    <div class="u"><div class="bar" style="height:64px"></div><div class="n">16 · 64</div></div>
  </div>
</body></html>
