<!-- @dsCard group="Spacing" viewport="700x150" name="Corner radii" subtitle="Suaves y amigables, nunca en punta" -->
<!DOCTYPE html>
<html lang="es">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--surface-app);padding:22px;}
  .row{display:flex;gap:18px;align-items:flex-end;}
  .u{text-align:center;}
  .b{width:72px;height:56px;background:var(--gl-pine);}
  .n{font-size:11px;color:var(--text-muted);margin-top:9px;}
</style></head>
<body>
  <div class="row">
    <div class="u"><div class="b" style="border-radius:var(--radius-sm)"></div><div class="n">sm · 8</div></div>
    <div class="u"><div class="b" style="border-radius:var(--radius-md)"></div><div class="n">md · 12</div></div>
    <div class="u"><div class="b" style="border-radius:var(--radius-lg)"></div><div class="n">lg · 16</div></div>
    <div class="u"><div class="b" style="border-radius:var(--radius-xl)"></div><div class="n">xl · 20</div></div>
    <div class="u"><div class="b" style="border-radius:var(--radius-2xl)"></div><div class="n">2xl · 28</div></div>
    <div class="u"><div class="b" style="width:56px;border-radius:var(--radius-pill)"></div><div class="n">pill</div></div>
  </div>
</body></html>
