<!DOCTYPE html>
<html lang="es">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--surface-app);padding:26px 24px;}
  .row{display:flex;gap:26px;}
  .u{text-align:center;}
  .c{width:120px;height:70px;background:var(--gl-white);border-radius:var(--radius-lg);}
  .n{font-size:12px;color:var(--text-muted);margin-top:12px;}
</style></head>
<body>
  <div class="row">
    <div class="u"><div class="c" style="box-shadow:var(--shadow-xs)"></div><div class="n">xs</div></div>
    <div class="u"><div class="c" style="box-shadow:var(--shadow-sm)"></div><div class="n">sm</div></div>
    <div class="u"><div class="c" style="box-shadow:var(--shadow-md)"></div><div class="n">md</div></div>
    <div class="u"><div class="c" style="box-shadow:var(--shadow-lg)"></div><div class="n">lg</div></div>
  </div>
</body></html>
