<!-- @dsCard group="Components" viewport="700x210" name="Button" subtitle="Variantes, tamaños y estados (shadcn)" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: {
    colors: {
      background:'#FBFAF5', foreground:'#14261F',
      primary:{DEFAULT:'#1E4D3B',foreground:'#F5F3EC'},
      secondary:{DEFAULT:'#E5EDE7',foreground:'#1E4D3B'},
      muted:{DEFAULT:'#F1EFE7',foreground:'#6F7A72'},
      accent:{DEFAULT:'#E8C98E',foreground:'#14261F'},
      destructive:{DEFAULT:'#C0503B',foreground:'#FFFFFF'},
      border:'#E7E4DA', input:'#E7E4DA', ring:'#8FB09B'
    },
    borderRadius:{ lg:'1rem', md:'calc(1rem - 2px)', sm:'calc(1rem - 4px)' },
    fontFamily:{ sans:['Hanken Grotesk','sans-serif'] }
  }}}
</script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Hanken Grotesk',sans-serif}</style>
</head>
<body class="bg-background p-6">
  <div class="text-[11px] uppercase tracking-[.16em] text-muted-foreground mb-2">Variantes</div>
  <div class="flex flex-wrap gap-3 items-center mb-5">
    <button class="inline-flex h-10 items-center rounded-md bg-primary px-5 text-sm font-semibold text-primary-foreground shadow-sm hover:bg-primary/90">Activar protección</button>
    <button class="inline-flex h-10 items-center rounded-md bg-secondary px-5 text-sm font-semibold text-secondary-foreground hover:bg-secondary/80">Ver detalles</button>
    <button class="inline-flex h-10 items-center rounded-md border border-input bg-background px-5 text-sm font-semibold text-foreground hover:bg-secondary">Outline</button>
    <button class="inline-flex h-10 items-center rounded-md px-5 text-sm font-semibold text-foreground hover:bg-secondary">Ghost</button>
    <button class="inline-flex h-10 items-center rounded-md bg-destructive px-5 text-sm font-semibold text-destructive-foreground shadow-sm hover:bg-destructive/90">Bloquear número</button>
  </div>
  <div class="text-[11px] uppercase tracking-[.16em] text-muted-foreground mb-2">Tamaños · Deshabilitado</div>
  <div class="flex flex-wrap gap-3 items-center">
    <button class="inline-flex h-9 items-center rounded-md bg-primary px-3.5 text-sm font-semibold text-primary-foreground">Small</button>
    <button class="inline-flex h-10 items-center rounded-md bg-primary px-5 text-sm font-semibold text-primary-foreground">Medium</button>
    <button class="inline-flex h-12 items-center rounded-md bg-primary px-7 text-base font-semibold text-primary-foreground">Large</button>
    <button disabled class="inline-flex h-10 items-center rounded-md bg-primary px-5 text-sm font-semibold text-primary-foreground opacity-50 cursor-not-allowed">Deshabilitado</button>
  </div>
</body></html>
